services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: temp-sent-mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./docker/mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./docker/mosquitto/data:/mosquitto/data
      - ./docker/mosquitto/log:/mosquitto/log
    networks:
      iotnet:
        aliases:
          - mosquitto

  mqtt-firebase-bridge:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: temp-sent-mqtt-firebase
    restart: unless-stopped
    depends_on:
      - mosquitto
    environment:
      MQTT_URL: ${MQTT_URL:-mqtt://mosquitto:1883}
      MQTT_USERNAME: ${MQTT_USERNAME:-}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-}
      MQTT_CLIENT_ID: ${MQTT_CLIENT_ID:-mqtt-firebase-bridge}
      MQTT_TELEMETRY_TOPICS: ${MQTT_TELEMETRY_TOPICS:-iot/sensors/+/telemetry}
      MQTT_KPI_TOPICS: ${MQTT_KPI_TOPICS:-iot/sensors/+/info,iot/sensors/+/errors,iot/actuators/+/status}
      FIREBASE_DATABASE_URL: ${FIREBASE_DATABASE_URL}
      FIREBASE_SERVICE_ACCOUNT_PATH: /run/secrets/firebase-service-account.json
      FIREBASE_TELEMETRY_PATH: ${FIREBASE_TELEMETRY_PATH:-/iot/telemetry}
      FIREBASE_HARDWARE_PATH: ${FIREBASE_HARDWARE_PATH:-/iot/hardware}
    volumes:
      - ${FIREBASE_SERVICE_ACCOUNT_FILE:-./firebase-service-account.json}:/run/secrets/firebase-service-account.json:ro
    networks:
      - iotnet

networks:
  iotnet:
    name: temp-sent-iotnet
