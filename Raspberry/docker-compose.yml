services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: temp-sent-mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./docker/mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./docker/mosquitto/data:/mosquitto/data
      - ./docker/mosquitto/log:/mosquitto/log
    networks:
      iotnet:
        aliases:
          - mosquitto

  mqtt-rest-bridge:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: temp-sent-mqtt-rest
    restart: unless-stopped
    depends_on:
      - mosquitto
    environment:
      MQTT_URL: ${MQTT_URL:-mqtt://mosquitto:1883}
      MQTT_USERNAME: ${MQTT_USERNAME:-}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-}
      MQTT_CLIENT_ID: ${MQTT_CLIENT_ID:-mqtt-firebase-bridge}
      MQTT_TELEMETRY_TOPICS: ${MQTT_TELEMETRY_TOPICS:-iot/sensors/+/telemetry}
      MQTT_KPI_TOPICS: ${MQTT_KPI_TOPICS:-iot/sensors/+/info,iot/sensors/+/errors,iot/actuators/+/status}
      REST_BASE_URL: ${REST_BASE_URL}
      REST_TELEMETRY_PATH: ${REST_TELEMETRY_PATH:-/api/v1/telemetry}
      REST_KPI_PATH: ${REST_KPI_PATH:-/api/v1/hardware}
      HTTP_TIMEOUT_MS: ${HTTP_TIMEOUT_MS:-5000}
    networks:
      - iotnet

  raspberry-control:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: temp-sent-raspberry-control
    restart: unless-stopped
    depends_on:
      - mosquitto
    environment:
      CONTROL_PORT: ${CONTROL_PORT:-4000}
      MQTT_URL: ${MQTT_URL:-mqtt://mosquitto:1883}
      MQTT_USERNAME: ${MQTT_USERNAME:-}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-}
      MQTT_CLIENT_ID: ${MQTT_CONTROL_CLIENT_ID:-raspberry-control}
      ACTUATOR_ON_SPEED_PCT: ${ACTUATOR_ON_SPEED_PCT:-100}
    command: ["npm", "run", "start:control"]
    ports:
      - "${CONTROL_PORT:-4000}:${CONTROL_PORT:-4000}"
    networks:
      - iotnet

networks:
  iotnet:
    name: temp-sent-iotnet
