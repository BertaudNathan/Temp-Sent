; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; ============================================================
; Configuration PlatformIO — Projet IoT Temp+Ventilation
; Deux firmwares distincts : emitter (capteur) et receiver (actionneur)
; ============================================================

[common]
platform  = espressif32
board     = esp32dev
framework = arduino
monitor_speed = 115200
build_flags = -I ${PROJECT_INCLUDE_DIR}
upload_protocol = espota
upload_flags    = --auth=ota-secret-password
lib_deps =
    adafruit/DHT sensor library @ ^1.4.6
    adafruit/Adafruit Unified Sensor @ ^1.1.14
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson @ ^7.2.1

; ------------------------------------------------------------
; ESP32 Emetteur : lit DHT22, publie temp+hum via MQTT
; ------------------------------------------------------------
[env:emitter]
platform  = ${common.platform}
board     = ${common.board}
framework = ${common.framework}
monitor_speed = ${common.monitor_speed}
build_flags = ${common.build_flags}
lib_deps  = ${common.lib_deps}
build_src_filter = +<main_emitter.cpp>

; ------------------------------------------------------------
; ESP32 Récepteur : reçoit commandes MQTT, pilote ventilation PWM
; ------------------------------------------------------------
[env:receiver]
platform  = ${common.platform}
board     = ${common.board}
framework = ${common.framework}
monitor_speed = ${common.monitor_speed}
build_flags = ${common.build_flags}
lib_deps  = ${common.lib_deps}
build_src_filter = +<main_receiver.cpp>
