services:
  mariadb:
    image: mariadb:11
    container_name: temp-sent-mariadb
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${MARIADB_DATABASE:-tempsent}
      MARIADB_USER: ${MARIADB_USER:-tempsent}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:-tempsent}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-root}
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./back/db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: ./back
      dockerfile: Dockerfile
    container_name: temp-sent-api
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      PORT: ${PORT:-3000}

      # Firebase RTDB
      FIREBASE_DATABASE_URL: ${FIREBASE_DATABASE_URL}
      FIREBASE_SERVICE_ACCOUNT_PATH: /run/secrets/firebase-service-account.json
      FIREBASE_TELEMETRY_PATH: ${FIREBASE_TELEMETRY_PATH:-/iot/telemetry}
      FIREBASE_HARDWARE_PATH: ${FIREBASE_HARDWARE_PATH:-/iot/hardware}

      # MariaDB
      MARIADB_HOST: mariadb
      MARIADB_PORT: 3306
      MARIADB_DATABASE: ${MARIADB_DATABASE:-tempsent}
      MARIADB_USER: ${MARIADB_USER:-tempsent}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:-tempsent}

      # Archive job
      ARCHIVE_CRON_ENABLED: ${ARCHIVE_CRON_ENABLED:-true}
      ARCHIVE_CRON_SCHEDULE: ${ARCHIVE_CRON_SCHEDULE:-"5 0 * * *"}
      ARCHIVE_OLDER_THAN_HOURS: ${ARCHIVE_OLDER_THAN_HOURS:-24}
      ARCHIVE_PAGE_SIZE: ${ARCHIVE_PAGE_SIZE:-500}
      ARCHIVE_DELETE_CHUNK_SIZE: ${ARCHIVE_DELETE_CHUNK_SIZE:-500}
      TZ: ${TZ:-Europe/Paris}

      # Actions forwarding (API -> Raspberry control server)
      RASPBERRY_CONTROL_BASE_URL: ${RASPBERRY_CONTROL_BASE_URL:-}
      RASPBERRY_CONTROL_TIMEOUT_MS: ${RASPBERRY_CONTROL_TIMEOUT_MS:-5000}

    volumes:
      - ../Raspberry/key.json:/run/secrets/firebase-service-account.json:ro
    ports:
      - "${PORT:-3000}:${PORT:-3000}"

  front:
    image: node:20-alpine
    container_name: temp-sent-front
    restart: unless-stopped
    working_dir: /app
    depends_on:
      - api
    environment:
      HOST: 0.0.0.0
    volumes:
      - ./front:/app
      - front_node_modules:/app/node_modules
    command: sh -lc "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"

volumes:
  mariadb_data:
  front_node_modules:
