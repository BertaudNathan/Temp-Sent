<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Temp Sent</title>
    <style>
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 0; padding: 16px; }
      .grid { display: grid; grid-template-columns: 1fr; gap: 16px; }
      @media (min-width: 900px) { .grid { grid-template-columns: 1fr 1fr; } }
      .card { border: 1px solid #ddd; border-radius: 8px; padding: 12px; }
      .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
      label { font-size: 12px; color: #444; }
      input, select, button { padding: 6px 8px; }
      button { cursor: pointer; }
      .list { max-height: 360px; overflow: auto; border-top: 1px solid #eee; margin-top: 8px; padding-top: 8px; }
      .item { border-bottom: 1px solid #f0f0f0; padding: 6px 0; }
      .muted { color: #666; font-size: 12px; }
      .error { color: #b00020; white-space: pre-wrap; }
      code { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
    </style>
  </head>
  <body>
    <h1>Temp Sent</h1>
    <p class="muted">Temps réel (hot via API) + historique (cold via API) + actions.</p>

    <div class="card">
      <div class="row">
        <div>
          <div class="muted">API</div>
          <div><code id="apiBaseUrl"></code></div>
        </div>
        <div>
          <div class="muted">Données</div>
          <div><code id="rtdbPath"></code></div>
        </div>
      </div>
      <div id="globalError" class="error" style="margin-top:8px"></div>
    </div>

    <div class="grid">
      <div class="card">
        <h2>Télémétrie (hot via API)</h2>
        <div class="row">
          <label>Max</label>
          <select id="telemetryLimit">
            <option value="20">20</option>
            <option value="50" selected>50</option>
            <option value="100">100</option>
          </select>
          <button id="telemetryReconnect">Refresh</button>
        </div>
        <div id="telemetryRealtimeError" class="error" style="margin-top:8px"></div>
        <div id="telemetryRealtime" class="list"></div>
      </div>

      <div class="card">
        <h2>Hardware/KPI (hot via API)</h2>
        <div class="row">
          <label>Max</label>
          <select id="hardwareLimit">
            <option value="20">20</option>
            <option value="50" selected>50</option>
            <option value="100">100</option>
          </select>
          <button id="hardwareReconnect">Refresh</button>
        </div>
        <div id="hardwareRealtimeError" class="error" style="margin-top:8px"></div>
        <div id="hardwareRealtime" class="list"></div>
      </div>

      <div class="card">
        <h2>Historique (API → MariaDB)</h2>
        <div class="row">
          <label>Source</label>
          <select id="coldSource">
            <option value="cold" selected>cold</option>
            <option value="hot">hot</option>
            <option value="both">both</option>
          </select>
          <label>Limit</label>
          <select id="coldLimit">
            <option value="50" selected>50</option>
            <option value="200">200</option>
            <option value="500">500</option>
          </select>
          <button id="refreshCold">Refresh</button>
        </div>
        <div id="coldError" class="error" style="margin-top:8px"></div>
        <h3>Télémétrie</h3>
        <div id="telemetryCold" class="list"></div>
        <h3>Hardware/KPI</h3>
        <div id="hardwareCold" class="list"></div>
      </div>

      <div class="card">
        <h2>Actions (via API)</h2>
        <div class="row">
          <label>Actuator ID</label>
          <input id="actuatorId" placeholder="ex: fan-1" />
          <label>Commande</label>
          <select id="actuatorCommand">
            <option value="on">on</option>
            <option value="off">off</option>
          </select>
          <button id="sendCommand">Envoyer</button>
        </div>
        <div id="actionError" class="error" style="margin-top:8px"></div>
        <div id="actionResult" class="muted" style="margin-top:8px"></div>
        <p class="muted">Envoie: <code>POST /api/v1/actuators/:id/command</code> avec <code>{"command":"on"|"off"}</code>.</p>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
